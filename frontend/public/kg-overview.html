<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Career KG Overview</title>
    <style>
      :root {
        color-scheme: light;
        --ink: oklch(0.2 0.03 220);
        --muted: oklch(0.46 0.018 220);
        --paper: oklch(0.975 0.01 88);
        --panel: oklch(0.995 0.005 88);
        --line: oklch(0.82 0.018 230);
        --blue: oklch(0.5 0.14 252);
        --cyan: oklch(0.64 0.12 205);
        --gold: oklch(0.72 0.14 83);
        --red: oklch(0.58 0.18 31);
        --green: oklch(0.58 0.12 155);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 8%, oklch(0.9 0.035 250 / 0.72), transparent 28%),
          linear-gradient(135deg, var(--paper), oklch(0.94 0.012 230));
        color: var(--ink);
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr) 326px;
        gap: 12px;
        height: 100vh;
        padding: 14px;
      }

      .panel,
      .map-stage {
        min-height: 0;
        border: 1px solid color-mix(in oklch, var(--line) 78%, white);
        background: color-mix(in oklch, white 88%, var(--panel));
      }

      .panel {
        display: grid;
        align-content: start;
        gap: 14px;
        padding: 14px;
        overflow: auto;
      }

      .map-stage {
        position: relative;
        overflow: hidden;
      }

      .brand {
        display: grid;
        gap: 6px;
      }

      .kicker {
        margin: 0;
        color: color-mix(in oklch, var(--blue) 68%, black);
        font-size: 11px;
        font-weight: 780;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1,
      h2,
      h3,
      .node-title {
        font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      }

      h1 {
        font-size: 30px;
        line-height: 1.06;
        letter-spacing: -0.04em;
      }

      h2 {
        font-size: 22px;
      }

      h3 {
        font-size: 18px;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .search {
        display: grid;
        gap: 8px;
      }

      .search input {
        width: 100%;
        min-height: 42px;
        border: 1px solid color-mix(in oklch, var(--line) 82%, black);
        border-radius: 0;
        padding: 0 11px;
        background: white;
        color: var(--ink);
        outline: none;
      }

      .search input:focus-visible {
        border-color: var(--blue);
        box-shadow: 0 0 0 2px color-mix(in oklch, var(--blue) 18%, transparent);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        padding: 10px;
        border: 1px solid color-mix(in oklch, var(--line) 74%, white);
        background: oklch(0.99 0.006 88);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.12em;
      }

      .stat strong {
        display: block;
        margin-top: 5px;
        font-size: 22px;
        line-height: 1;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .chip,
      .tool-button {
        min-height: 30px;
        border: 1px solid color-mix(in oklch, var(--line) 82%, black);
        border-radius: 0;
        background: white;
        color: var(--ink);
        cursor: pointer;
      }

      .chip {
        padding: 5px 8px;
        font-size: 12px;
      }

      .chip[aria-pressed="true"] {
        background: color-mix(in oklch, var(--blue) 10%, white);
        border-color: color-mix(in oklch, var(--blue) 56%, black);
      }

      .tools {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .tool-button {
        padding: 7px 9px;
        font-weight: 680;
      }

      .tool-button.primary {
        background: oklch(0.18 0.035 212);
        border-color: oklch(0.18 0.035 212);
        color: white;
      }

      .legend {
        display: grid;
        gap: 8px;
      }

      .legend-row {
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
      }

      .swatch {
        width: 18px;
        height: 3px;
        background: var(--line);
      }

      .map-toolbar {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 2;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border: 1px solid color-mix(in oklch, var(--line) 78%, white);
        background: oklch(1 0 0 / 0.9);
        backdrop-filter: blur(8px);
      }

      .readout {
        color: var(--muted);
        font-size: 12px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      canvas.is-dragging {
        cursor: grabbing;
      }

      .detail {
        display: grid;
        gap: 12px;
      }

      .node-title {
        font-size: 24px;
        line-height: 1.15;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .tag {
        padding: 5px 7px;
        border: 1px solid color-mix(in oklch, var(--line) 70%, white);
        background: color-mix(in oklch, white 84%, oklch(0.9 0.026 252));
        color: var(--ink);
        font-size: 12px;
      }

      .kv {
        display: grid;
        gap: 6px;
      }

      .kv div {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 1px solid color-mix(in oklch, var(--line) 72%, white);
        padding: 7px 0;
        color: var(--muted);
        font-size: 12px;
      }

      .kv strong {
        color: var(--ink);
        text-align: right;
      }

      .empty {
        padding: 16px;
        border: 1px dashed color-mix(in oklch, var(--line) 78%, black);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .file-input {
        display: none;
      }

      @media (max-width: 1180px) {
        .shell {
          grid-template-columns: 252px minmax(0, 1fr);
        }

        .panel.detail-panel {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <div class="brand">
          <p class="kicker">Career KG Atlas</p>
          <h1>知识图谱总图</h1>
          <p class="hint">全局分层视图。滚轮缩放，拖拽平移，点击节点查看连接。</p>
        </div>

        <div class="stats" id="stats"></div>

        <label class="search">
          <span class="kicker">Search</span>
          <input id="searchInput" type="search" placeholder="搜索节点 / 类型 / 来源" autocomplete="off" />
        </label>

        <section>
          <p class="kicker">Layers</p>
          <div class="chips" id="layerChips"></div>
        </section>

        <section>
          <p class="kicker">Relations</p>
          <div class="chips" id="relationChips"></div>
        </section>

        <section>
          <p class="kicker">Tools</p>
          <div class="tools">
            <button class="tool-button primary" id="fitButton" type="button">适配全图</button>
            <button class="tool-button" id="clearButton" type="button">清除选择</button>
            <button class="tool-button" id="loadButton" type="button">导入 JSON</button>
            <button class="tool-button" id="labelsButton" type="button" aria-pressed="false">显示标签</button>
          </div>
          <input class="file-input" id="fileInput" type="file" accept="application/json,.json" />
        </section>

        <section class="legend" id="legend"></section>
      </aside>

      <section class="map-stage">
        <div class="map-toolbar">
          <span class="readout" id="readout">Loading graph...</span>
        </div>
        <canvas id="canvas"></canvas>
      </section>

      <aside class="panel detail-panel">
        <div class="detail" id="detail">
          <p class="kicker">Inspector</p>
          <div class="empty">选择一个节点。总图会高亮它的一阶邻居和相关边。</div>
        </div>
      </aside>
    </main>

    <script>
      const LAYER_ORDER = ["evidence", "ability", "composite", "direction", "role"];
      const LAYER_LABELS = {
        evidence: "原子证据",
        ability: "基础能力",
        composite: "复合能力",
        direction: "岗位方向",
        role: "具体职业",
        unknown: "未分层",
      };
      const RELATION_COLORS = {
        supports: "oklch(0.58 0.13 205)",
        requires: "oklch(0.67 0.15 80)",
        inhibits: "oklch(0.58 0.18 31)",
        evidences: "oklch(0.5 0.14 252)",
        prefers: "oklch(0.57 0.12 155)",
        unknown: "oklch(0.55 0.03 220)",
      };
      const NODE_COLORS = {
        evidence: "oklch(0.79 0.065 252)",
        ability: "oklch(0.83 0.055 205)",
        composite: "oklch(0.86 0.06 155)",
        direction: "oklch(0.86 0.075 84)",
        role: "oklch(0.78 0.08 31)",
        unknown: "oklch(0.78 0.02 220)",
      };

      const canvas = document.querySelector("#canvas");
      const ctx = canvas.getContext("2d");
      const state = {
        graph: null,
        hovered: null,
        selected: null,
        search: "",
        showLabels: false,
        activeLayers: new Set(),
        activeRelations: new Set(),
        transform: { x: 0, y: 0, k: 1 },
        dragging: false,
        lastPoint: null,
        pointerStart: null,
        dragMoved: false,
      };

      function valueOf(object, keys, fallback = "") {
        for (const key of keys) {
          const value = object?.[key];
          if (value !== undefined && value !== null && value !== "") return value;
        }
        return fallback;
      }

      function endpoint(value) {
        return typeof value === "object" && value ? value.id || value.key || value.node_id : value;
      }

      function normalizeGraph(payload) {
        const rawNodes = payload.nodes || payload.vertices || payload.graph?.nodes || [];
        const rawEdges = payload.edges || payload.links || payload.graph?.edges || payload.graph?.links || [];
        const nodes = rawNodes.map((node, index) => {
          const id = String(valueOf(node, ["id", "key", "node_id"], `node_${index}`));
          const layer = String(valueOf(node, ["layer", "stage", "level"], "unknown"));
          const type = String(valueOf(node, ["node_type", "type", "category", "kind"], layer));
          const metadata = node.metadata || node.meta || {};
          return {
            raw: node,
            id,
            name: String(valueOf(node, ["name", "label", "title"], id)),
            layer,
            type,
            description: String(valueOf(node, ["description", "summary", "note"], "")),
            aggregator: String(valueOf(node, ["aggregator", "strategy"], "")),
            metadata,
            degree: 0,
            inDegree: 0,
            outDegree: 0,
            x: 0,
            y: 0,
            r: 4,
          };
        });
        const nodeMap = new Map(nodes.map((node) => [node.id, node]));
        const edges = rawEdges
          .map((edge, index) => ({
            raw: edge,
            id: String(valueOf(edge, ["id", "key"], `edge_${index}`)),
            source: String(endpoint(valueOf(edge, ["source", "from", "source_id"]))),
            target: String(endpoint(valueOf(edge, ["target", "to", "target_id"]))),
            relation: String(valueOf(edge, ["relation", "type", "label", "kind"], "unknown")),
            weight: Number(valueOf(edge, ["weight", "value", "score", "strength"], 1)) || 0,
            note: String(valueOf(edge, ["note", "description", "summary"], "")),
          }))
          .filter((edge) => nodeMap.has(edge.source) && nodeMap.has(edge.target));
        for (const edge of edges) {
          const source = nodeMap.get(edge.source);
          const target = nodeMap.get(edge.target);
          source.degree += 1;
          source.outDegree += 1;
          target.degree += 1;
          target.inDegree += 1;
        }
        const layers = [...new Set(nodes.map((node) => node.layer))].sort((a, b) => {
          const ai = LAYER_ORDER.indexOf(a);
          const bi = LAYER_ORDER.indexOf(b);
          return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi) || a.localeCompare(b);
        });
        const relations = [...new Set(edges.map((edge) => edge.relation))].sort();
        return { nodes, edges, nodeMap, layers, relations, meta: payload };
      }

      function layoutGraph(graph) {
        const maxLayerCount = Math.max(...graph.layers.map((layer) => graph.nodes.filter((node) => node.layer === layer).length), 1);
        graph.world = {
          width: Math.max(1700, graph.layers.length * 380),
          height: Math.max(1400, maxLayerCount * 12 + 260),
        };
        graph.layers.forEach((layer, layerIndex) => {
          const nodes = graph.nodes
            .filter((node) => node.layer === layer)
            .sort((a, b) => b.degree - a.degree || a.type.localeCompare(b.type) || a.name.localeCompare(b.name, "zh-Hans-CN"));
          const x = 170 + layerIndex * ((graph.world.width - 340) / Math.max(1, graph.layers.length - 1));
          const gap = (graph.world.height - 250) / Math.max(1, nodes.length);
          nodes.forEach((node, index) => {
            node.x = x + ((index % 2) - 0.5) * 22;
            node.y = 150 + gap * (index + 0.5);
            node.r = Math.max(3.5, Math.min(9, 3.2 + Math.sqrt(node.degree) * 0.8));
          });
        });
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }

      function viewportSize() {
        const rect = canvas.getBoundingClientRect();
        return { width: rect.width, height: rect.height };
      }

      function fitGraph() {
        const graph = state.graph;
        if (!graph) return;
        const view = viewportSize();
        const k = Math.min(view.width / graph.world.width, view.height / graph.world.height) * 0.92;
        state.transform.k = k;
        state.transform.x = (view.width - graph.world.width * k) / 2;
        state.transform.y = (view.height - graph.world.height * k) / 2;
        draw();
      }

      function toWorld(point) {
        return {
          x: (point.x - state.transform.x) / state.transform.k,
          y: (point.y - state.transform.y) / state.transform.k,
        };
      }

      function isSearchMatch(node) {
        if (!state.search) return true;
        const haystack = `${node.id} ${node.name} ${node.layer} ${node.type} ${node.description} ${JSON.stringify(node.metadata)}`.toLowerCase();
        return haystack.includes(state.search.toLowerCase());
      }

      function visibleNode(node) {
        return state.activeLayers.has(node.layer);
      }

      function selectedNeighborhood() {
        const ids = new Set();
        const edgeIds = new Set();
        const focus = state.selected || state.hovered;
        if (!focus || !state.graph) return { ids, edgeIds };
        ids.add(focus.id);
        for (const edge of state.graph.edges) {
          if (edge.source === focus.id || edge.target === focus.id) {
            ids.add(edge.source);
            ids.add(edge.target);
            edgeIds.add(edge.id);
          }
        }
        return { ids, edgeIds };
      }

      function draw() {
        const graph = state.graph;
        const view = viewportSize();
        ctx.save();
        ctx.clearRect(0, 0, view.width, view.height);
        if (!graph) {
          ctx.restore();
          return;
        }

        const { x, y, k } = state.transform;
        const focus = selectedNeighborhood();
        ctx.translate(x, y);
        ctx.scale(k, k);
        drawLayerBands(graph);
        drawEdges(graph, focus);
        drawNodes(graph, focus);
        ctx.restore();
        updateReadout();
      }

      function drawLayerBands(graph) {
        const h = graph.world.height;
        graph.layers.forEach((layer) => {
          const nodes = graph.nodes.filter((node) => node.layer === layer);
          if (!nodes.length) return;
          const x = nodes.reduce((sum, node) => sum + node.x, 0) / nodes.length;
          ctx.fillStyle = NODE_COLORS[layer] || NODE_COLORS.unknown;
          ctx.globalAlpha = 0.07;
          ctx.fillRect(x - 105, 42, 210, h - 84);
          ctx.globalAlpha = 1;
          ctx.fillStyle = "oklch(0.25 0.035 220)";
          ctx.font = "700 22px Songti SC, STSong, serif";
          ctx.textAlign = "center";
          ctx.fillText(LAYER_LABELS[layer] || layer, x, 82);
          ctx.font = "680 12px Avenir Next, PingFang SC, sans-serif";
          ctx.fillStyle = "oklch(0.48 0.02 220)";
          ctx.fillText(`${nodes.length} nodes`, x, 104);
        });
      }

      function drawEdges(graph, focus) {
        ctx.lineCap = "round";
        for (const edge of graph.edges) {
          if (!state.activeRelations.has(edge.relation)) continue;
          const source = graph.nodeMap.get(edge.source);
          const target = graph.nodeMap.get(edge.target);
          if (!source || !target || !visibleNode(source) || !visibleNode(target)) continue;
          const searchDim = state.search && (!isSearchMatch(source) && !isSearchMatch(target));
          const focused = focus.edgeIds.has(edge.id);
          ctx.globalAlpha = focused ? 0.86 : searchDim ? 0.025 : focus.ids.size ? 0.045 : 0.12;
          ctx.strokeStyle = RELATION_COLORS[edge.relation] || RELATION_COLORS.unknown;
          ctx.lineWidth = focused ? 2.6 : Math.max(0.45, Math.min(1.4, 0.42 + Math.abs(edge.weight) * 2.2));
          const dx = Math.max(80, Math.abs(target.x - source.x) * 0.42);
          ctx.beginPath();
          ctx.moveTo(source.x, source.y);
          ctx.bezierCurveTo(source.x + dx, source.y, target.x - dx, target.y, target.x, target.y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      function drawNodes(graph, focus) {
        for (const node of graph.nodes) {
          if (!visibleNode(node)) continue;
          const searchMatch = isSearchMatch(node);
          const focused = focus.ids.has(node.id);
          const selected = state.selected?.id === node.id;
          const hovered = state.hovered?.id === node.id;
          ctx.globalAlpha = state.search && !searchMatch ? 0.18 : focus.ids.size && !focused ? 0.34 : 1;
          ctx.fillStyle = NODE_COLORS[node.layer] || NODE_COLORS.unknown;
          ctx.strokeStyle = selected ? "oklch(0.24 0.13 252)" : hovered ? "oklch(0.45 0.14 252)" : "oklch(0.58 0.035 220)";
          ctx.lineWidth = selected ? 2.8 : hovered || focused ? 1.8 : 0.8;
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.r + (selected ? 2 : 0), 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          if (shouldLabel(node, focused, searchMatch)) drawNodeLabel(node, selected || hovered);
        }
        ctx.globalAlpha = 1;
      }

      function shouldLabel(node, focused, searchMatch) {
        if (state.showLabels) return true;
        if (state.selected?.id === node.id || state.hovered?.id === node.id) return true;
        if (state.search && searchMatch) return true;
        return focused && node.degree >= 4;
      }

      function drawNodeLabel(node, strong) {
        ctx.font = `${strong ? 760 : 680} 12px Avenir Next, PingFang SC, sans-serif`;
        ctx.textBaseline = "middle";
        const text = node.name.length > 18 ? `${node.name.slice(0, 18)}…` : node.name;
        const width = ctx.measureText(text).width + 12;
        const layerNodes = state.graph?.nodes.filter((item) => item.layer === node.layer) || [];
        const layerCenterX = layerNodes.length ? layerNodes.reduce((sum, item) => sum + item.x, 0) / layerNodes.length : node.x;
        const labelOnLeft = node.layer === state.graph?.layers[0] && node.x < layerCenterX;
        const boxX = labelOnLeft ? node.x - node.r - 5 - width : node.x + node.r + 5;
        const textX = labelOnLeft ? boxX + 6 : node.x + node.r + 11;
        ctx.textAlign = "left";
        ctx.fillStyle = "oklch(1 0 0 / 0.88)";
        ctx.fillRect(boxX, node.y - 10, width, 20);
        ctx.strokeStyle = "oklch(0.84 0.018 220)";
        ctx.lineWidth = 0.8;
        ctx.strokeRect(boxX, node.y - 10, width, 20);
        ctx.fillStyle = "oklch(0.19 0.03 220)";
        ctx.fillText(text, textX, node.y + 1);
      }

      function hitTest(point) {
        if (!state.graph) return null;
        const world = toWorld(point);
        let best = null;
        let bestDistance = Infinity;
        for (const node of state.graph.nodes) {
          if (!visibleNode(node)) continue;
          const distance = Math.hypot(node.x - world.x, node.y - world.y);
          const threshold = Math.max(8, node.r + 5 / state.transform.k);
          if (distance < threshold && distance < bestDistance) {
            best = node;
            bestDistance = distance;
          }
        }
        return best;
      }

      function renderControls() {
        const graph = state.graph;
        if (!graph) return;
        document.querySelector("#stats").innerHTML = [
          ["节点", graph.nodes.length],
          ["边", graph.edges.length],
          ["层", graph.layers.length],
          ["关系", graph.relations.length],
        ]
          .map(([label, value]) => `<div class="stat"><span>${label}</span><strong>${value}</strong></div>`)
          .join("");
        renderChipGroup("#layerChips", graph.layers, state.activeLayers, (value) => LAYER_LABELS[value] || value);
        renderChipGroup("#relationChips", graph.relations, state.activeRelations, (value) => value);
        document.querySelector("#legend").innerHTML = `<p class="kicker">Legend</p>${graph.relations
          .map((relation) => {
            const count = graph.edges.filter((edge) => edge.relation === relation).length;
            const color = RELATION_COLORS[relation] || RELATION_COLORS.unknown;
            return `<div class="legend-row"><i class="swatch" style="background:${color}"></i><span>${relation}</span><strong>${count}</strong></div>`;
          })
          .join("")}`;
      }

      function renderChipGroup(selector, values, activeSet, labeler) {
        const root = document.querySelector(selector);
        root.innerHTML = values
          .map((value) => `<button class="chip" type="button" data-value="${escapeHtml(value)}" aria-pressed="${activeSet.has(value)}">${escapeHtml(labeler(value))}</button>`)
          .join("");
        root.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            const value = button.dataset.value;
            if (activeSet.has(value)) activeSet.delete(value);
            else activeSet.add(value);
            renderControls();
            draw();
          });
        });
      }

      function renderDetail(node) {
        const root = document.querySelector("#detail");
        if (!node) {
          root.innerHTML = `<p class="kicker">Inspector</p><div class="empty">选择一个节点。总图会高亮它的一阶邻居和相关边。</div>`;
          return;
        }
        const refs = node.metadata?.source_refs || [];
        root.innerHTML = `
          <p class="kicker">Inspector</p>
          <div>
            <p class="kicker">${escapeHtml(LAYER_LABELS[node.layer] || node.layer)}</p>
            <h2 class="node-title">${escapeHtml(node.name)}</h2>
          </div>
          <div class="tags">
            <span class="tag">${escapeHtml(node.type)}</span>
            ${node.aggregator ? `<span class="tag">${escapeHtml(node.aggregator)}</span>` : ""}
            ${node.metadata?.origin ? `<span class="tag">${escapeHtml(node.metadata.origin)}</span>` : ""}
          </div>
          ${node.description ? `<p class="hint">${escapeHtml(node.description)}</p>` : ""}
          <div class="kv">
            <div><span>ID</span><strong>${escapeHtml(node.id)}</strong></div>
            <div><span>入边</span><strong>${node.inDegree}</strong></div>
            <div><span>出边</span><strong>${node.outDegree}</strong></div>
            <div><span>总度数</span><strong>${node.degree}</strong></div>
            <div><span>来源</span><strong>${refs.length || node.metadata?.provenance_count || 0}</strong></div>
          </div>
          ${refs.length ? `<div><p class="kicker">Sources</p><p class="hint">${refs.slice(0, 3).map((ref) => escapeHtml(ref.source_title || ref.source_id || ref.profile_id)).join("<br>")}</p></div>` : ""}
        `;
      }

      function updateReadout() {
        const graph = state.graph;
        if (!graph) return;
        const visibleNodes = graph.nodes.filter(visibleNode).length;
        const visibleEdges = graph.edges.filter((edge) => state.activeRelations.has(edge.relation)).length;
        document.querySelector("#readout").textContent = `${visibleNodes} nodes · ${visibleEdges} edges · ${Math.round(state.transform.k * 100)}%`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[char]);
      }

      async function loadGraph(payload) {
        state.graph = normalizeGraph(payload);
        layoutGraph(state.graph);
        state.activeLayers = new Set(state.graph.layers);
        state.activeRelations = new Set(state.graph.relations);
        state.selected = null;
        state.hovered = null;
        renderControls();
        renderDetail(null);
        fitGraph();
      }

      async function boot() {
        try {
          const response = await fetch("./kg-overview-data.json", { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          await loadGraph(await response.json());
        } catch (error) {
          document.querySelector("#readout").textContent = "无法加载 kg-overview-data.json";
          document.querySelector("#detail").innerHTML = `<p class="kicker">Error</p><div class="empty">${escapeHtml(error.message)}</div>`;
        }
      }

      canvas.addEventListener("pointerdown", (event) => {
        state.dragging = true;
        state.pointerStart = { x: event.clientX, y: event.clientY };
        state.lastPoint = state.pointerStart;
        state.dragMoved = false;
        canvas.classList.add("is-dragging");
        canvas.setPointerCapture(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        const point = { x: event.clientX, y: event.clientY };
        if (state.dragging && state.lastPoint) {
          if (state.pointerStart && Math.hypot(point.x - state.pointerStart.x, point.y - state.pointerStart.y) > 4) {
            state.dragMoved = true;
          }
          state.transform.x += point.x - state.lastPoint.x;
          state.transform.y += point.y - state.lastPoint.y;
          state.lastPoint = point;
          draw();
          return;
        }
        const rect = canvas.getBoundingClientRect();
        const node = hitTest({ x: event.clientX - rect.left, y: event.clientY - rect.top });
        if (node?.id !== state.hovered?.id) {
          state.hovered = node;
          draw();
        }
      });

      canvas.addEventListener("pointerup", (event) => {
        const wasDragging = state.dragMoved;
        state.dragging = false;
        state.lastPoint = null;
        state.pointerStart = null;
        state.dragMoved = false;
        canvas.classList.remove("is-dragging");
        if (!wasDragging) {
          const rect = canvas.getBoundingClientRect();
          const node = hitTest({ x: event.clientX - rect.left, y: event.clientY - rect.top });
          if (!node) {
            return;
          }
          if (state.selected?.id === node.id) {
            state.selected = null;
            renderDetail(null);
          } else {
            state.selected = node;
            renderDetail(node);
          }
          draw();
        }
      });

      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const point = { x: event.clientX - rect.left, y: event.clientY - rect.top };
        const before = toWorld(point);
        const factor = event.deltaY < 0 ? 1.12 : 0.89;
        state.transform.k = Math.max(0.08, Math.min(3.6, state.transform.k * factor));
        state.transform.x = point.x - before.x * state.transform.k;
        state.transform.y = point.y - before.y * state.transform.k;
        draw();
      }, { passive: false });

      document.querySelector("#searchInput").addEventListener("input", (event) => {
        state.search = event.target.value.trim();
        draw();
      });
      document.querySelector("#fitButton").addEventListener("click", fitGraph);
      document.querySelector("#clearButton").addEventListener("click", () => {
        state.selected = null;
        state.hovered = null;
        state.search = "";
        document.querySelector("#searchInput").value = "";
        renderDetail(null);
        draw();
      });
      document.querySelector("#labelsButton").addEventListener("click", (event) => {
        state.showLabels = !state.showLabels;
        event.currentTarget.setAttribute("aria-pressed", String(state.showLabels));
        event.currentTarget.textContent = state.showLabels ? "隐藏标签" : "显示标签";
        draw();
      });
      document.querySelector("#loadButton").addEventListener("click", () => document.querySelector("#fileInput").click());
      document.querySelector("#fileInput").addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        await loadGraph(JSON.parse(await file.text()));
      });
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
      boot();
    </script>
  </body>
</html>
